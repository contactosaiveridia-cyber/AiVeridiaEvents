# QLoRA fine-tuning de AiVeridiaEvents sobre Llama 3.1 8B Instruct.
# Corre en 1× g5.2xlarge (24 GB A10G) o RTX 4090: ~2-4 h con 5-8k ejemplos.
#   pip install axolotl[flash-attn]   &&   axolotl train axolotl_config.yml

base_model: meta-llama/Meta-Llama-3.1-8B-Instruct
model_type: LlamaForCausalLM
tokenizer_type: AutoTokenizer

load_in_4bit: true          # QLoRA
adapter: qlora
lora_r: 32
lora_alpha: 16
lora_dropout: 0.05
lora_target_linear: true    # todos los proyectores lineales

datasets:
  - path: ../dataset/train.jsonl
    type: sharegpt
    conversation: llama3    # misma plantilla de chat que sirve Ollama/CMI

sequence_len: 4096
sample_packing: true
pad_to_sequence_len: true

micro_batch_size: 2
gradient_accumulation_steps: 8
num_epochs: 3
learning_rate: 2.0e-4
lr_scheduler: cosine
warmup_ratio: 0.05
optimizer: adamw_bnb_8bit

bf16: auto
flash_attention: true
gradient_checkpointing: true

val_set_size: 0.05
eval_steps: 50
save_strategy: epoch
output_dir: ./checkpoints/aiveridia-events-qlora

special_tokens:
  pad_token: "<|end_of_text|>"
