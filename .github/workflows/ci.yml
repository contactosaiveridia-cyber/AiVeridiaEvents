name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  agents:
    name: lint + tests (Postgres real)
    runs-on: ubuntu-latest
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aiveridia
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d aiveridia"
          --health-interval 5s --health-timeout 3s --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/aiveridia
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar servicio agents
        working-directory: apps/agents
        run: pip install -e .[dev]
      - name: Lint (ruff)
        working-directory: apps/agents
        run: ruff check src tests
      - name: Migraciones + seed
        run: |
          for f in db/migrations/*.sql; do psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"; done
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f db/seed.sql
      - name: Tests (RLS, doble-reserva, grafos, borde, RAG, ML)
        working-directory: apps/agents
        run: python -m pytest -v --cov=src --cov-report=term --cov-fail-under=80

  db-verify:
    name: SQL en Postgres embebido (PGlite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - working-directory: db/verify
        run: npm install && npm run verify

  dashboard:
    name: build dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - working-directory: apps/dashboard
        run: npm install && npm run build

  terraform:
    name: terraform fmt + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.x"
      - working-directory: infra
        run: |
          terraform fmt -check -recursive
          terraform init -backend=false
          terraform validate

  docker:
    name: build imágenes (dev + AgentCore)
    runs-on: ubuntu-latest
    needs: [agents]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Imagen dev del servicio
        run: docker build -t aiveridia-agents:ci apps/agents
      - name: Imágenes AgentCore (arm64)
        run: |
          docker buildx build --platform linux/arm64 \
            -f infra/docker/Dockerfile.graph-comercial apps/agents
          docker buildx build --platform linux/arm64 \
            -f infra/docker/Dockerfile.graph-operativo apps/agents
      # Push a ECR solo en main, con credenciales OIDC (descomentar al tener el rol):
      # - uses: aws-actions/configure-aws-credentials@v4
      #   if: github.ref == 'refs/heads/main'
      #   with:
      #     role-to-assume: arn:aws:iam::ACCOUNT:role/aiveridia-ci
      #     aws-region: us-east-1
